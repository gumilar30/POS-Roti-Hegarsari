<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        .btn-logout { background: #c0392b; color: white; margin-top: 20px; border: none; cursor: pointer; display: block; padding: 10px 15px; border-radius: 5px; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🍞 Hegarsari</h2>
    <a href="index.html" class="menu-admin" style="background: #34495e;">🏠 Dashboard</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="report.html" class="menu-admin">📊 Report</a>
    <a href="search.html">🔍 Search Resi</a>
    <a href="admin.html" class="menu-admin">⚙️ Admin</a>
    <a href="#" onclick="logout()" class="btn-logout">🚪 Logout</a>
</div>

<div class="content">
    <h1>Dashboard Super Admin</h1>
    <div class="summary-grid">
        <div class="stat-card"><h3>Total Omzet</h3><div id="dashOmzet" class="stat-value">Rp 0</div></div>
        <div class="stat-card"><h3>Transaksi</h3><div id="dashTransaksi" class="stat-value">0</div></div>
        <div class="stat-card"><h3>Produk</h3><div id="dashProduk" class="stat-value">0</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
        authDomain: "roti-hegarsari.firebaseapp.com",
        databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "roti-hegarsari",
        storageBucket: "roti-hegarsari.firebasestorage.app",
        messagingSenderId: "770636746020",
        appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    auth.onAuthStateChanged((user) => {
        const role = localStorage.getItem("userRole");
        if (!user) {
            window.location.href = "login.html";
        } else {
            const adminMenus = document.querySelectorAll('.menu-admin');
            if (role === "superadmin") {
                adminMenus.forEach(el => el.style.display = 'block');
            } else {
                window.location.href = "sales.html";
            }
        }
    });

    function logout() {
        auth.signOut().then(() => { localStorage.clear(); window.location.href = "login.html"; });
    }

    database.ref('produk/').on('value', (snap) => {
        document.getElementById("dashProduk").innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
    });

    database.ref('transaksi/').on('value', (snap) => {
        let total = 0; let count = 0;
        if (snap.exists()) {
            snap.forEach(child => { total += child.val().total; count++; });
        }
        document.getElementById("dashOmzet").innerText = "Rp " + total.toLocaleString();
        document.getElementById("dashTransaksi").innerText = count;
    });
</script>
</body>
</html>
