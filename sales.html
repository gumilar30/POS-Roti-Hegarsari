<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-section { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #panelCash { display: block; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        
        /* Tambahan agar daftar produk bisa di-scroll jika sangat banyak */
        #daftarProduk { 
            max-height: 500px; 
            overflow-y: auto; 
            border: 1px solid #eee;
            border-radius: 4px;
        }
        
        /* Gaya Bar Pencarian */
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html">🏠 Dashboard</a>
        <a href="sales.html" style="background: #34495e;">🛒 Sales</a>
        <a href="report.html">📊 Report</a>
        <a href="admin.html">⚙️ Admin</a>
    </div>

    <div class="content">
        <h1>Kasir Penjualan (Live Cloud)</h1>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            
            <div class="card" style="flex: 1; min-width: 300px;">
                <h3>Menu Roti</h3>
                
                <input type="text" id="searchMenu" class="search-box" placeholder="🔍 Cari nama roti..." oninput="renderProduk()">
                
                <div id="daftarProduk">Memuat stok...</div>
            </div>

            <div class="card" style="width: 350px;">
                <h3>Keranjang 🛒</h3>
                <div id="cart" style="min-height: 50px; margin-bottom: 10px; font-size: 14px;"></div>
                <hr>
                
                <div class="payment-section">
                    <div class="input-group">
                        <label>No. HP Customer (WhatsApp):</label>
                        <input type="number" id="customerHP" placeholder="Contoh: 08123456789">
                    </div>

                    <h4>Total Tagihan: Rp <span id="total">0</span></h4>

                    <div class="input-group">
                        <label>Metode Pembayaran:</label>
                        <select id="metodeBayar" onchange="toggleBayarCash()">
                            <option value="Cash">Cash / Tunai</option>
                            <option value="Transfer">Transfer Bank</option>
                            <option value="QRIS">QRIS</option>
                            <option value="ShopeePay">ShopeePay</option>
                            <option value="OVO">OVO / Dana</option>
                        </select>
                    </div>

                    <div id="panelCash">
                        <div class="input-group">
                            <label>Jumlah Bayar (Tunai):</label>
                            <input type="number" id="inputBayar" placeholder="0" oninput="hitungKembalian()">
                        </div>
                        <p style="font-weight:bold; color: #e74c3c; margin: 0;">Kembalian: Rp <span id="kembalian">0</span></p>
                    </div>
                </div>

                <button onclick="checkout()" style="width:100%; background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size: 16px; margin-top: 10px;">Selesaikan & Print Resi</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let produkObj = {};
        let cart = [];
        let totalTagihan = 0;

        database.ref('produk/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) { 
                produkObj = data; 
                renderProduk(); 
            } else {
                document.getElementById("daftarProduk").innerHTML = "Produk belum ditambahkan di Admin.";
            }
        });

        function renderProduk() {
            const container = document.getElementById("daftarProduk");
            const keyword = document.getElementById("searchMenu").value.toLowerCase(); // Ambil kata kunci pencarian
            container.innerHTML = "";
            
            Object.keys(produkObj).forEach((id) => {
                const item = produkObj[id];
                
                // FILTER: Hanya tampilkan jika nama roti mengandung kata kunci pencarian
                if (item.nama.toLowerCase().includes(keyword)) {
                    container.innerHTML += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;">
                            <div>
                                <strong style="display:block;">${item.nama}</strong>
                                <small>Stok: ${item.stok} | Rp ${Number(item.harga).toLocaleString()}</small>
                            </div>
                            <button onclick="tambahKeCart('${id}')" style="background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer; padding: 8px 15px; font-weight:bold;">+</button>
                        </div>`;
                }
            });
            
            if (container.innerHTML === "") {
                container.innerHTML = "<p style='padding:10px; color:gray;'>Roti tidak ditemukan...</p>";
            }
        }

        function tambahKeCart(id) {
            const itemAsli = produkObj[id];
            if (itemAsli.stok <= 0) return alert("Stok habis!");
            
            let itemInCart = cart.find(c => c.id === id);
            if (itemInCart) { 
                itemInCart.qty++; 
            } else { 
                cart.push({...itemAsli, id: id, qty: 1}); 
            }

            produkObj[id].stok--;
            renderCart(); 
            renderProduk();
        }

        function renderCart() {
            const cartDiv = document.getElementById("cart");
            cartDiv.innerHTML = "";
            totalTagihan = 0;

            if (cart.length === 0) cartDiv.innerHTML = "Keranjang kosong";

            cart.forEach((item) => {
                const subtotal = item.harga * item.qty;
                totalTagihan += subtotal;
                cartDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${item.nama} (x${item.qty})</span>
                    <span>Rp ${subtotal.toLocaleString()}</span>
                </div>`;
            });
            
            document.getElementById("total").innerText = totalTagihan.toLocaleString();
            hitungKembalian();
        }

        function toggleBayarCash() {
            const metode = document.getElementById("metodeBayar").value;
            document.getElementById("panelCash").style.display = (metode === "Cash") ? "block" : "none";
        }

        function hitungKembalian() {
            const bayar = document.getElementById("inputBayar").value || 0;
            const kembalian = bayar - totalTagihan;
            document.getElementById("kembalian").innerText = (kembalian > 0) ? kembalian.toLocaleString() : "0";
        }

        function checkout() {
            if (cart.length === 0) return alert("Keranjang masih kosong!");
            const metode = document.getElementById("metodeBayar").value;
            const bayarManual = document.getElementById("inputBayar").value;
            
            if (metode === "Cash" && (!bayarManual || bayarManual < totalTagihan)) {
                return alert("Jumlah bayar kurang!");
            }

            const hpCustomer = document.getElementById("customerHP").value || "Umum/Tanpa No HP";
            const transID = "TRX-" + Date.now();
            
            const dataTransaksi = {
                id: transID,
                customer: hpCustomer,
                item: cart,
                total: totalTagihan,
                metode: metode,
                bayar: bayarManual || totalTagihan,
                kembalian: document.getElementById("kembalian").innerText,
                waktu: new Date().toLocaleString('id-ID')
            };

            const updates = {};
            cart.forEach(item => { updates['/produk/' + item.id + '/stok'] = item.stok; });
            updates['/transaksi/' + transID] = dataTransaksi;

            database.ref().update(updates).then(() => {
                printResi(dataTransaksi);
                alert("Transaksi Berhasil!");
                cart = [];
                document.getElementById("customerHP").value = "";
                document.getElementById("inputBayar").value = "";
                renderCart();
            });
        }

        function printResi(data) {
            const win = window.open("", "", "width=300,height=600");
            let itemHtml = data.item.map(i => `
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom: 2px;">
                    <span>${i.nama} x${i.qty}</span>
                    <span>${(i.harga * i.qty).toLocaleString()}</span>
                </div>
            `).join("");

            win.document.write(`
                <html>
                <head>
                    <style>
                        @page { size: 56mm 160mm; margin: 0; }
                        body { width: 56mm; font-family: 'Courier New', monospace; padding: 4mm; margin: 0; }
                        .center { text-align: center; }
                        .line { border-top: 1px dashed #000; margin: 8px 0; }
                    </style>
                </head>
                <body onload="window.print(); window.close();">
                    <div class="center"><strong>ROTI HEGARSARI</strong></div>
                    <div class="line"></div>
                    <div style="font-size:10px;">No: ${data.id}<br>Tgl: ${data.waktu}<br>HP: ${data.customer}</div>
                    <div class="line"></div>
                    ${itemHtml}
                    <div class="line"></div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>TOTAL:</span><span>Rp ${data.total.toLocaleString()}</span></div>
                    <div style="font-size:11px;">METODE: ${data.metode}<br>BAYAR: Rp ${Number(data.bayar).toLocaleString()}<br>KEMBALI: Rp ${data.kembalian}</div>
                    <div class="line"></div>
                    <div class="center" style="font-size:10px;">Terima Kasih!</div>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
