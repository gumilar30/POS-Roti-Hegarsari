<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-update { background: #f39c12 !important; }
        .btn-cancel { background: #95a5a6; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; display: none; }
        .pagination { display: flex; gap: 5px; margin-top: 10px; justify-content: center; align-items: center; }
        .page-btn { padding: 5px 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .page-btn.active { background: #3498db; color: white; border-color: #3498db; }
        .page-btn:disabled { cursor: not-allowed; opacity: 0.5; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .danger-zone { border-top: 5px solid #e74c3c; background: #fff5f5; padding: 20px; border-radius: 8px; }
        .search-container { margin-bottom: 15px; }
        .search-container input { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ddd; padding-left: 20px; box-sizing: border-box; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #f9f9f9; }
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-tool { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; text-align: center; text-decoration: none; }
        
        /* Gaya Khusus Tombol Backup agar Mencolok */
        .btn-mega-backup { 
            background: #6c5ce7; color: white; width: 100%; padding: 18px; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 25px; 
            font-size: 16px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-mega-backup:hover { background: #5b4bc4; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html" class="menu-admin">🏠 Dashboard</a>
        <a href="sales.html">🛒 Sales</a>
        <a href="report.html" class="menu-admin">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html" class="menu-admin" style="background: #34495e;">⚙️ Admin</a>
        <a href="#" onclick="logout()" style="color: #e74c3c; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Admin Panel (Manajemen Toko)</h1>

        <button class="btn-mega-backup" onclick="megaBackup()">
            <span>📂</span> BACKUP SELURUH DATABASE (EXCEL MULTI-SHEET)
        </button>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="form-container" style="flex: 2; min-width: 300px;">
                <h3 id="formTitle">Tambah / Edit Produk</h3>
                <input type="hidden" id="editKey">
                <div class="form-group"><label>Nama Roti:</label><input type="text" id="namaProduk"></div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;"><label>Harga (Rp):</label><input type="number" id="hargaProduk"></div>
                    <div class="form-group" style="flex:1;"><label>Stok:</label><input type="number" id="stokProduk"></div>
                </div>
                <div class="form-group">
                    <label>Kategori:</label>
                    <select id="kategoriProduk"><option value="">Pilih Kategori...</option></select>
                </div>
                <div class="form-group"><label>Link Foto (URL):</label><input type="text" id="fotoProduk"></div>
                <button id="btnSave" class="btn-save" onclick="simpanProduk()">💾 Simpan Produk</button>
                <button id="btnCancel" class="btn-cancel" onclick="resetForm()">❌ Batal Edit</button>
                
                <hr>
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                    <h4 style="margin-top:0;">🚀 Update Harga & Stok Massal</h4>
                    <p style="font-size: 11px; color: #666;">Edit banyak data lewat Excel sekaligus.</p>
                    <div class="tools-grid">
                        <button onclick="downloadMasterStok()" class="btn-tool" style="background: #2980b9;">📥 1. Download Data</button>
                        <label class="btn-tool" style="background: #27ae60; cursor: pointer;">
                            📤 2. Upload Update
                            <input type="file" id="fileUpdateStok" accept=".xlsx, .xls" style="display:none;" onchange="importUpdateStok()">
                        </label>
                    </div>
                </div>
            </div>

            <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 20px;">
                <div class="form-container">
                    <h3>Atur Kategori</h3>
                    <input type="text" id="newKategori" placeholder="Kategori baru..." style="width: 75%; padding: 8px;">
                    <button onclick="tambahKategori()" style="padding: 8px;">➕</button>
                    <div id="listKategori" style="margin-top: 10px; min-height: 120px;"></div>
                    <div id="paginationKat" class="pagination"></div>
                </div>

                <div class="danger-zone">
                    <h3 style="color: #e74c3c;">🧹 Bersihkan Transaksi</h3>
                    <div class="form-group">
                        <label>Cabang:</label>
                        <select id="delCabang"><option value="Semua">Semua Cabang</option></select>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <div class="form-group" style="flex:1;"><label>Dari:</label><input type="date" id="delStart"></div>
                        <div class="form-group" style="flex:1;"><label>Sampai:</label><input type="date" id="delEnd"></div>
                    </div>
                    <button class="btn-delete" style="width: 100%; padding: 12px; font-weight: bold;" onclick="hapusTransaksiRentang()">Hapus Permanen</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                <h3>Daftar Stok Produk</h3>
                <div class="search-container" style="width: 300px;">
                    <input type="text" id="searchProduk" placeholder="🔍 Cari nama produk..." oninput="renderProduk()">
                </div>
            </div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr><th>Foto</th><th>Nama Produk & ID</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabelProduk"></tbody>
            </table>
            <div id="paginationProd" class="pagination" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allKategori = [];
        let pageKat = 1;
        const limitKat = 3;
        let allProduk = [];
        let pageProd = 1;
        const limitProd = 10;

        auth.onAuthStateChanged((user) => {
            const role = localStorage.getItem("userRole");
            if (!user || role !== "superadmin") { window.location.href = "sales.html"; }
        });

        // --- 1. FUNGSI MEGA BACKUP (MULTI-SHEET) ---
        async function megaBackup() {
            try {
                const snap = await db.ref('/').once('value');
                const data = snap.val();
                const wb = XLSX.utils.book_new();

                // Sheet Produk
                const prodData = Object.keys(data.produk || {}).map(id => ({ ID: id, ...data.produk[id] }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodData), "PRODUK");

                // Sheet Transaksi
                const trxData = Object.keys(data.transaksi || {}).map(id => ({ ID_TRX: id, ...data.transaksi[id] }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(trxData), "TRANSAKSI");

                // Sheet Kategori
                const katData = Object.keys(data.kategori_produk || {}).map(id => ({ NAMA: data.kategori_produk[id] }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(katData), "KATEGORI");

                XLSX.writeFile(wb, `HEGARSARI_DATABASE_BACKUP_${new Date().toISOString().split('T')[0]}.xlsx`);
                alert("Backup Berhasil Disimpan!");
            } catch (e) { alert("Backup Gagal: " + e.message); }
        }

        // --- 2. UPDATE MASSAL HARGA & STOK ---
        function downloadMasterStok() {
            const dataToExport = allProduk.map(p => ({ ID_UNIK: p.id, NAMA: p.nama, HARGA: p.harga, STOK: p.stok }));
            XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(dataToExport), "Stok"), "Master_Stok_Edit.xlsx");
        }

        function importUpdateStok() {
            const file = document.getElementById('fileUpdateStok').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const updates = {};
                json.forEach(item => {
                    const id = item.ID_UNIK || item.ID;
                    if(id) {
                        if(item.STOK !== undefined) updates[`/produk/${id}/stok`] = parseInt(item.STOK);
                        if(item.HARGA !== undefined) updates[`/produk/${id}/harga`] = parseInt(item.HARGA);
                    }
                });
                db.ref().update(updates).then(() => { alert("Update Selesai!"); location.reload(); });
            };
            reader.readAsArrayBuffer(file);
        }

        // --- 3. MANAJEMEN PRODUK & TABEL ---
        function generateHegarID() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 6; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
            return 'HEGAR-' + result;
        }

        function renderProduk() {
            const keyword = document.getElementById('searchProduk').value.toLowerCase();
            const table = document.getElementById('tabelProduk');
            let filtered = allProduk.filter(p => p.nama.toLowerCase().includes(keyword)).sort((a,b)=>a.kategori.localeCompare(b.kategori));
            table.innerHTML = "";
            filtered.slice((pageProd-1)*limitProd, pageProd*limitProd).forEach(p => {
                table.innerHTML += `<tr>
                    <td><img src="${p.foto||'https://via.placeholder.com/40'}" class="img-preview"></td>
                    <td><strong style="font-size:15px;">${p.nama}</strong><br><small style="color:#7f8c8d;">ID: ${p.id}</small></td>
                    <td>${p.kategori}</td>
                    <td>Rp ${p.harga.toLocaleString()}</td>
                    <td><strong style="color:${p.stok<=5?'red':'black'}">${p.stok}</strong></td>
                    <td>
                        <button class="btn-edit" onclick="editProduk('${p.id}','${p.nama}',${p.harga},${p.stok},'${p.kategori}','${p.foto}')">Edit</button>
                        <button class="btn-delete" onclick="hapusProduk('${p.id}')">Hapus</button>
                    </td>
                </tr>`;
            });
            const total = Math.ceil(filtered.length / limitProd);
            document.getElementById('paginationProd').innerHTML = `<button class="page-btn" onclick="changePageProd(-1)" ${pageProd==1?'disabled':''}>Prev</button><span>Halaman ${pageProd} dari ${total||1}</span><button class="page-btn" onclick="changePageProd(1)" ${pageProd==total||total==0?'disabled':''}>Next</button>`;
        }

        function simpanProduk() {
            let key = document.getElementById('editKey').value;
            const data = {
                nama: document.getElementById('namaProduk').value,
                harga: parseInt(document.getElementById('hargaProduk').value),
                stok: parseInt(document.getElementById('stokProduk').value),
                kategori: document.getElementById('kategoriProduk').value,
                foto: document.getElementById('fotoProduk').value
            };
            if(!data.nama || !data.kategori) return alert("Lengkapi data!");
            if (!key) key = generateHegarID();
            db.ref('produk/' + key).set(data).then(() => { alert("Berhasil!"); resetForm(); });
        }

        function editProduk(key, n, h, s, k, f) {
            document.getElementById('formTitle').innerText = "Mode Edit: " + key;
            document.getElementById('editKey').value = key;
            document.getElementById('namaProduk').value = n;
            document.getElementById('hargaProduk').value = h;
            document.getElementById('stokProduk').value = s;
            document.getElementById('kategoriProduk').value = k;
            document.getElementById('fotoProduk').value = f;
            document.getElementById('btnSave').innerText = "Update Produk";
            document.getElementById('btnSave').classList.add('btn-update');
            document.getElementById('btnCancel').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editKey').value = ""; document.getElementById('namaProduk').value = "";
            document.getElementById('hargaProduk').value = ""; document.getElementById('stokProduk').value = "";
            document.getElementById('kategoriProduk').value = ""; document.getElementById('fotoProduk').value = "";
            document.getElementById('formTitle').innerText = "Tambah / Edit Produk";
            document.getElementById('btnSave').innerText = "💾 Simpan Produk";
            document.getElementById('btnSave').classList.remove('btn-update');
            document.getElementById('btnCancel').style.display = "none";
        }

        // --- FUNGSI PENDUKUNG LAINNYA ---
        function muatKategori() {
            db.ref('kategori_produk').on('value', (snap) => {
                allKategori = []; const data = snap.val() || {};
                Object.keys(data).forEach(id => allKategori.push({ id, nama: data[id] }));
                allKategori.reverse(); renderKategori();
                let opts = '<option value="">Pilih Kategori...</option>';
                [...allKategori].sort((a,b)=>a.nama.localeCompare(b.nama)).forEach(item => opts += `<option value="${item.nama}">${item.nama}</option>`);
                document.getElementById('kategoriProduk').innerHTML = opts;
            });
        }
        function renderKategori() {
            const container = document.getElementById('listKategori');
            container.innerHTML = "";
            allKategori.slice((pageKat-1)*limitKat, pageKat*limitKat).forEach(item => {
                container.innerHTML += `<div class="cat-item"><span>${item.nama}</span><button class="btn-delete" style="padding:2px 6px;" onclick="hapusKategori('${item.id}')">✕</button></div>`;
            });
            const total = Math.ceil(allKategori.length / limitKat);
            document.getElementById('paginationKat').innerHTML = `<button class="page-btn" onclick="changePageKat(-1)" ${pageKat==1?'disabled':''}>Prev</button><span>${pageKat}/${total||1}</span><button class="page-btn" onclick="changePageKat(1)" ${pageKat==total||total==0?'disabled':''}>Next</button>`;
        }
        function changePageKat(dir) { pageKat += dir; renderKategori(); }
        function tambahKategori() {
            const kat = document.getElementById('newKategori').value.trim();
            if(kat) db.ref('kategori_produk').push(kat).then(() => { document.getElementById('newKategori').value=""; pageKat=1; });
        }
        function hapusKategori(id) { if(confirm("Hapus?")) db.ref('kategori_produk/'+id).remove(); }
        function muatProduk() {
            db.ref('produk').on('value', (snap) => {
                allProduk = []; const data = snap.val() || {};
                Object.keys(data).forEach(id => allProduk.push({ id, ...data[id] }));
                renderProduk();
            });
        }
        function changePageProd(dir) { pageProd += dir; renderProduk(); }
        function hapusProduk(key) { if(confirm("Yakin hapus?")) db.ref('produk/' + key).remove(); }
        async function hapusTransaksiRentang() {
            const cabang = document.getElementById('delCabang').value;
            const start = document.getElementById('delStart').value;
            const end = document.getElementById('delEnd').value;
            if (!start || !end) return alert("Pilih tanggal!");
            if (confirm(`Hapus transaksi ${cabang} periode ${start} s/d ${end}?`)) {
                const ref = db.ref('transaksi');
                const snap = await ref.orderByChild('tanggalMurni').startAt(start).endAt(end).once('value');
                if (!snap.exists()) return alert("Data tidak ditemukan.");
                const updates = {};
                snap.forEach(child => { if (cabang === "Semua" || child.val().lokasi === cabang) updates[child.key] = null; });
                ref.update(updates).then(() => { alert("Pembersihan Sukses!"); location.reload(); });
            }
        }
        function logout() { auth.signOut().then(() => { localStorage.clear(); window.location.href = "login.html"; }); }
        db.ref('cabang/').once('value', s => s.forEach(c => { let o=document.createElement('option'); o.value=c.val(); o.innerText=c.val(); document.getElementById('delCabang').appendChild(o); }));
        muatKategori(); muatProduk();
    </script>
</body>
</html>
