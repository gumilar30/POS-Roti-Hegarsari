<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2980b9; }
        label { display: block; text-align: left; font-size: 12px; font-weight: bold; color: #555; margin-bottom: -5px; }
    </style>
</head>
<body style="background: #f4f7f6; display: block;">
    <div class="login-box">
        <h2>🍞 Hegarsari Admin</h2>
        <p>Silakan login untuk akses kasir</p>
        
        <input type="email" id="email" placeholder="Email Admin">
        <input type="password" id="password" placeholder="Password">
        
        <label for="lokasiToko">Lokasi Cabang:</label>
        <select id="lokasiToko">
            <option value="">Memuat lokasi...</option>
        </select>
        
        <button onclick="prosesLogin()">Masuk Ke Sistem</button>
        <p id="pesanError" style="color: red; font-size: 13px; margin-top: 10px;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil daftar cabang dari Firebase secara otomatis
        db.ref('cabang/').once('value', (snap) => {
            const list = snap.val();
            let html = '<option value="">-- Pilih Lokasi Cabang --</option>';
            if (list) {
                for(let id in list) {
                    html += `<option value="${list[id]}">${list[id]}</option>`;
                }
            } else {
                html = '<option value="">Belum ada cabang terdaftar</option>';
            }
            document.getElementById('lokasiToko').innerHTML = html;
        });

        function prosesLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const lokasi = document.getElementById('lokasiToko').value;
            const pesanError = document.getElementById('pesanError');

            // Validasi pilihan lokasi
            if(!lokasi) {
                pesanError.innerText = "Pilih lokasi cabang dulu!";
                return;
            }

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => {
                    // Simpan lokasi terpilih di browser agar halaman sales tahu ini cabang mana
                    localStorage.setItem("cabangSekarang", lokasi);
                    window.location.href = "sales.html";
                })
                .catch((error) => { 
                    pesanError.innerText = "Email atau Password Salah!"; 
                });
        }
    </script>
</body>
</html>
