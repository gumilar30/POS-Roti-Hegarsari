<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; background: #ddd; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        #daftarProduk { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 5px; }
        .prod-card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px; text-align: center; border: 1px solid #eee; }
        .prod-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .prod-card h4 { margin: 5px 0; font-size: 14px; }
        .btn-add { width: 100%; background: #3498db; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dashed #eee; }
        .btn-remove { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .total-highlight { border-top: 3px solid #2c3e50; border-bottom: 3px solid #2c3e50; padding: 15px 0; margin: 15px 0; background: #fcfcfc; text-align: center; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #panelCash { display: block; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .btn-logout { background: #c0392b; color: white; margin-top: 20px; text-align: left !important; display: block; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html">🏠 Dashboard</a>
        <a href="sales.html" style="background: #34495e;">🛒 Sales</a>
        <a href="report.html">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html">⚙️ Admin</a>
        <a href="#" onclick="logout()" class="btn-logout">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Kasir Penjualan</h1>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1; min-width: 350px;">
                <input type="text" id="searchMenu" placeholder="🔍 Cari nama roti..." oninput="renderProduk()" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ddd;">
                <div id="tabKategori" class="tab-menu"><button class="tab-btn active" onclick="setFilter('Semua', this)">Semua</button></div>
                <div id="daftarProduk">Memuat...</div>
            </div>
            <div class="card" style="width: 350px;">
                <h3>Keranjang 🛒</h3>
                <div id="cart" style="font-size: 14px; margin-bottom: 10px; min-height: 50px;"></div>
                <hr>
                <div class="payment-section">
                    <div class="input-group"><label>No. HP Customer:</label><input type="number" id="customerHP" placeholder="08123456789"></div>
                    <div class="input-group"><label>Diskon (%):</label><input type="number" id="inputDiskon" placeholder="0" oninput="renderCart()"></div>
                    <div class="total-highlight"><h2 style="margin: 0; color: #2c3e50;">TOTAL: Rp <span id="totalFinal">0</span></h2></div>
                    <div class="input-group">
                        <label>Metode Pembayaran:</label>
                        <select id="metodeBayar" onchange="handlePaymentMethod()"><option value="Cash">Cash</option><option value="Transfer">Transfer</option><option value="QRIS">QRIS</option></select>
                    </div>
                    <div id="panelCash">
                        <label>Bayar (Tunai):</label>
                        <input type="number" id="inputBayar" oninput="hitungKembalian()"><p>Kembalian: Rp <span id="kembalian">0</span></p>
                    </div>
                </div>
                <div style="margin-top: 15px;"><input type="checkbox" id="sudahBayar"><label for="sudahBayar"> Customer Sudah Bayar</label></div>
                <button onclick="checkout()" style="width:100%; background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin-top: 10px;">Selesaikan & Print</button>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
        authDomain: "roti-hegarsari.firebaseapp.com",
        databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "roti-hegarsari",
        storageBucket: "roti-hegarsari.firebasestorage.app",
        messagingSenderId: "770636746020",
        appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged((user) => { if (!user) { window.location.href = "login.html"; } });
    function logout() { auth.signOut().then(() => { window.location.href = "login.html"; }); }

    let produkObj = {}; let cart = []; let filterKategori = "Semua";

    db.ref('produk/').on('value', (snap) => { 
        produkObj = snap.val() || {}; 
        renderProduk(); 
    });

    function setFilter(kat, btn) {
        filterKategori = kat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProduk();
    }

    function renderProduk() {
        const container = document.getElementById("daftarProduk");
        container.innerHTML = "";
        Object.keys(produkObj).forEach(id => {
            const p = produkObj[id];
            if(filterKategori === "Semua" || p.kategori === filterKategori) {
                container.innerHTML += `
                    <div class="prod-card">
                        <img src="${p.foto || ''}" width="100%">
                        <h4>${p.nama}</h4>
                        <small>Stok: ${p.stok}</small><br>
                        <button class="btn-add" onclick="tambahKeCart('${id}')">+</button>
                    </div>`;
            }
        });
    }

    function tambahKeCart(id) {
        if(produkObj[id].stok <= 0) return alert("Stok Habis!");
        let item = cart.find(c => c.id === id);
        if(item) item.qty++; else cart.push({...produkObj[id], id: id, qty: 1});
        produkObj[id].stok--; renderCart(); renderProduk();
    }

    function hapusDariCart(id) {
        let idx = cart.findIndex(c => c.id === id);
        if (idx > -1) {
            produkObj[id].stok++;
            if (cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1);
        }
        renderCart(); renderProduk();
    }

    function renderCart() {
        const cartDiv = document.getElementById("cart");
        let subtotal = 0; cartDiv.innerHTML = "";
        cart.forEach(i => {
            subtotal += i.harga * i.qty;
            cartDiv.innerHTML += `
                <div class="cart-item">
                    <span>${i.nama} x${i.qty}</span>
                    <button class="btn-remove" onclick="hapusDariCart('${i.id}')">✕</button>
                </div>`;
        });
        document.getElementById("totalFinal").innerText = subtotal.toLocaleString();
    }

    function handlePaymentMethod() {
        document.getElementById("panelCash").style.display = (document.getElementById("metodeBayar").value === "Cash") ? "block" : "none";
    }

    function checkout() {
        if(cart.length === 0 || !document.getElementById("sudahBayar").checked) return alert("Cek keranjang/pembayaran!");
        const skrg = new Date();
        const transID = "TRX-" + Date.now();
        const data = {
            id: transID, total: parseInt(document.getElementById("totalFinal").innerText.replace(/,/g, '')),
            waktu: skrg.toLocaleString('id-ID'),
            tanggalMurni: skrg.toISOString().split('T')[0]
        };
        db.ref('transaksi/' + transID).set(data).then(() => {
            alert("Berhasil!"); location.reload();
        });
    }
</script>
</body>
</html>
