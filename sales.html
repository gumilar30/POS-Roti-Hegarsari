<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Sales - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; background: #ddd; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        #daftarProduk { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 5px; }
        .prod-card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px; text-align: center; border: 1px solid #eee; }
        .prod-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .prod-card h4 { margin: 5px 0; font-size: 14px; }
        .btn-add { width: 100%; background: #3498db; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dashed #eee; }
        .btn-remove { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .total-highlight { border-top: 3px solid #2c3e50; border-bottom: 3px solid #2c3e50; padding: 15px 0; margin: 15px 0; background: #fcfcfc; text-align: center; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        #panelCash { display: block; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .btn-wa { background: #25d366; color: white; margin-top: 10px; width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; text-align: center; text-decoration: none; }
        .info-cabang { background: #2c3e50; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
        .auto-loading { font-size: 10px; color: #3498db; font-style: italic; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html" class="menu-admin">🏠 Dashboard</a>
        <a href="sales.html" style="background: #34495e;">🛒 Sales</a>
        <a href="report.html" class="menu-admin">📊 Report</a>
        <a href="customers.html">👥 Customers</a> 
        <a href="search.html">🔍 Search Resi</a> 
        <a href="admin.html" class="menu-admin">⚙️ Admin</a>
        <a href="#" onclick="logout()" style="color: #e74c3c; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Kasir Penjualan</h1>
            <div id="displayCabang" class="info-cabang">Cabang: -</div>
        </div>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1; min-width: 350px;">
                <input type="text" id="searchMenu" placeholder="🔍 Cari nama roti..." oninput="renderProduk()" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ddd;">
                <div id="tabKategori" class="tab-menu">
                    <button class="tab-btn active" onclick="setFilter('Semua', this)">Semua</button>
                </div>
                <div id="daftarProduk">Memuat produk...</div>
            </div>

            <div class="card" style="width: 350px;">
                <h3>Keranjang 🛒</h3>
                <div id="cart" style="font-size: 14px; margin-bottom: 10px; min-height: 50px;"></div>
                <hr>
                <div class="payment-section">
                    <div style="display: flex; gap: 5px;">
                        <div class="input-group" style="flex: 1;">
                            <label>No. HP (WA):</label>
                            <input type="number" id="customerHP" placeholder="0812..." oninput="cekCustomerLama()">
                            <span id="loadInfo" class="auto-loading">Mengecek database...</span>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Nama Customer:</label>
                            <input type="text" id="customerName" placeholder="Nama">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Catatan Khusus (Kitchen):</label>
                        <textarea id="catatanOrder" rows="2" placeholder="Contoh: Panaskan roti, Less sugar..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>Diskon (%):</label>
                        <input type="number" id="inputDiskon" placeholder="0" oninput="renderCart()">
                    </div>
                    
                    <div style="font-size: 14px; display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Subtotal:</span> <span>Rp <span id="valSubtotal">0</span></span>
                    </div>
                    
                    <div class="total-highlight">
                        <h2 style="margin: 0; color: #2c3e50;">TOTAL: Rp <span id="totalFinal">0</span></h2>
                    </div>

                    <div class="input-group">
                        <label>Metode Pembayaran:</label>
                        <select id="metodeBayar" onchange="handlePaymentMethod()">
                            <option value="Cash">Cash / Tunai</option>
                            <option value="Transfer">Transfer Bank</option>
                            <option value="QRIS">QRIS</option>
                        </select>
                    </div>

                    <div id="panelCash">
                        <label style="font-size: 12px; font-weight: bold;">Bayar (Tunai):</label>
                        <input type="number" id="inputBayar" placeholder="0" oninput="hitungKembalian()" style="width:100%; padding:8px; margin-bottom:5px;">
                        <p style="font-weight:bold; color: #e74c3c; margin: 0;">Kembalian: Rp <span id="kembalian">0</span></p>
                    </div>
                </div>

                <div style="margin-top: 15px;">
                    <input type="checkbox" id="sudahBayar">
                    <label for="sudahBayar" style="font-weight: bold; cursor: pointer;"> Customer Sudah Bayar</label>
                </div>

                <button onclick="checkout()" style="width:100%; background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; font-weight:bold; font-size:16px; cursor:pointer; margin-top: 10px;">Selesaikan & Print</button>
                <a id="btnWA" class="btn-wa" onclick="kirimWA()">📱 Kirim Resi ke WhatsApp</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const cabangAktif = localStorage.getItem("cabangSekarang");
        if(!cabangAktif) window.location.href = "login.html";
        document.getElementById('displayCabang').innerText = "Cabang: " + cabangAktif;

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = "login.html";
            const role = localStorage.getItem("userRole");
            const adminMenus = document.querySelectorAll('.menu-admin');
            adminMenus.forEach(el => el.style.display = (role === "superadmin" ? 'block' : 'none'));
        });

        function logout() { auth.signOut().then(() => { localStorage.clear(); window.location.href = "login.html"; }); }

        let produkObj = {};
        let cart = [];
        let filterKategori = "Semua";
        let dataTerakhir = null;

        function cekCustomerLama() {
            const hp = document.getElementById('customerHP').value;
            const info = document.getElementById('loadInfo');
            if (hp.length >= 9) {
                info.style.display = "block";
                db.ref('transaksi').orderByChild('customerPhone').equalTo(hp).limitToLast(1).once('value', (snap) => {
                    if (snap.exists()) {
                        const lastTrx = Object.values(snap.val())[0];
                        document.getElementById('customerName').value = lastTrx.customerName || "";
                        info.innerText = "✨ Pelanggan Lama Ditemukan";
                        info.style.color = "#27ae60";
                    } else {
                        db.ref('transaksi').orderByChild('customer').equalTo(hp).limitToLast(1).once('value', (snap2) => {
                            if (snap2.exists()) {
                                const lastTrx2 = Object.values(snap2.val())[0];
                                document.getElementById('customerName').value = lastTrx2.customerName || lastTrx2.nama || "";
                                info.innerText = "✨ Pelanggan Lama Ditemukan";
                                info.style.color = "#27ae60";
                            } else {
                                info.innerText = "🆕 Pelanggan Baru";
                                info.style.color = "#e67e22";
                            }
                        });
                    }
                });
            } else { info.style.display = "none"; info.innerText = "Mengecek database..."; }
        }

        db.ref('produk/').on('value', (snap) => { 
            produkObj = snap.val() || {}; 
            generateCategoryTabs();
            renderProduk(); 
        });

        function generateCategoryTabs() {
            const tabContainer = document.getElementById("tabKategori");
            const categories = new Set();
            Object.values(produkObj).forEach(p => { if(p.kategori) categories.add(p.kategori); });
            tabContainer.innerHTML = `<button class="tab-btn ${filterKategori === 'Semua' ? 'active' : ''}" onclick="setFilter('Semua', this)">Semua</button>`;
            categories.forEach(cat => { tabContainer.innerHTML += `<button class="tab-btn ${filterKategori === cat ? 'active' : ''}" onclick="setFilter('${cat}', this)">${cat}</button>`; });
        }

        function setFilter(kat, btn) {
            filterKategori = kat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProduk();
        }

        function renderProduk() {
            const container = document.getElementById("daftarProduk");
            const keyword = document.getElementById("searchMenu").value.toLowerCase();
            container.innerHTML = "";
            Object.keys(produkObj).forEach(id => {
                const p = produkObj[id];
                if(((filterKategori === "Semua") || (p.kategori === filterKategori)) && p.nama.toLowerCase().includes(keyword)) {
                    container.innerHTML += `<div class="prod-card"><img src="${p.foto || 'https://via.placeholder.com/100'}"><h4>${p.nama}</h4><small>Rp ${parseInt(p.harga).toLocaleString()}</small><br><small>Stok: ${p.stok}</small><button class="btn-add" onclick="tambahKeCart('${id}')">+</button></div>`;
                }
            });
        }

        function tambahKeCart(id) {
            if(produkObj[id].stok <= 0) return alert("Stok Habis!");
            let item = cart.find(c => c.id === id);
            if(item) item.qty++; else cart.push({...produkObj[id], id: id, qty: 1});
            produkObj[id].stok--;
            renderCart(); renderProduk();
        }

        function hapusDariCart(id) {
            let idx = cart.findIndex(c => c.id === id);
            if (idx > -1) { produkObj[id].stok++; if (cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1); }
            renderCart(); renderProduk();
        }

        function renderCart() {
            const cartDiv = document.getElementById("cart");
            let subtotal = 0; cartDiv.innerHTML = "";
            cart.forEach(i => {
                subtotal += i.harga * i.qty;
                cartDiv.innerHTML += `<div class="cart-item"><div style="flex:1;"><strong>${i.nama}</strong><br><small>x${i.qty} - Rp ${(i.harga*i.qty).toLocaleString()}</small></div><button class="btn-remove" onclick="hapusDariCart('${i.id}')">✕</button></div>`;
            });
            const pDiskon = parseFloat(document.getElementById("inputDiskon").value) || 0;
            const nPotongan = (pDiskon / 100) * subtotal;
            document.getElementById("valSubtotal").innerText = subtotal.toLocaleString();
            document.getElementById("totalFinal").innerText = (subtotal - nPotongan).toLocaleString();
            hitungKembalian();
        }

        function handlePaymentMethod() { document.getElementById("panelCash").style.display = (document.getElementById("metodeBayar").value === "Cash") ? "block" : "none"; }
        function hitungKembalian() {
            const total = parseInt(document.getElementById("totalFinal").innerText.replace(/,/g, '')) || 0;
            const bayar = parseInt(document.getElementById("inputBayar").value) || 0;
            document.getElementById("kembalian").innerText = (bayar - total > 0) ? (bayar - total).toLocaleString() : "0";
        }

        async function checkout() {
            if(cart.length === 0) return alert("Keranjang Kosong!");
            if(!document.getElementById("sudahBayar").checked) return alert("Konfirmasi 'Customer Sudah Bayar'!");
            
            const skrg = new Date();
            const formatTgl = skrg.toISOString().split('T')[0];
            let noAntrian = "01";
            const snap = await db.ref('transaksi').orderByChild('tanggalMurni').equalTo(formatTgl).once('value');
            if(snap.exists()) noAntrian = String(Object.keys(snap.val()).length + 1).padStart(2, '0');

            const sub = cart.reduce((a, b) => a + (b.harga * b.qty), 0);
            const pDsk = parseFloat(document.getElementById("inputDiskon").value) || 0;
            const nPot = (pDsk / 100) * sub;
            const trxID = "TRX-" + Date.now();

            dataTerakhir = {
                id: trxID, antrian: noAntrian, 
                customerName: document.getElementById("customerName").value || "Anonim", 
                customerPhone: document.getElementById("customerHP").value || "-", 
                catatan: document.getElementById("catatanOrder").value || "-", 
                items: [...cart], subtotal: sub, potongan: nPot, total: sub - nPot,
                metode: document.getElementById("metodeBayar").value, waktu: skrg.toLocaleString('id-ID'),
                tanggalMurni: formatTgl, lokasi: cabangAktif || "-"
            };

            const updates = {};
            cart.forEach(i => updates['/produk/'+i.id+'/stok'] = i.stok);
            updates['/transaksi/'+trxID] = dataTerakhir;

            db.ref().update(updates).then(() => {
                // REVISI: CETAK DALAM SATU JENDELA
                printStrukGabungan(dataTerakhir);

                document.getElementById("btnWA").style.display = "block";
                alert("Berhasil! Antrian: " + noAntrian);
                cart = []; renderCart(); renderProduk();
                document.getElementById("customerName").value = "";
                document.getElementById("customerHP").value = ""; 
                document.getElementById("catatanOrder").value = "";
                document.getElementById("inputDiskon").value = ""; 
                document.getElementById("inputBayar").value = ""; 
                document.getElementById("sudahBayar").checked = false;
                document.getElementById('loadInfo').style.display = "none";
            });
        }

        // FUNGSI PRINT GABUNGAN (REKOMENDASI)
        function printStrukGabungan(d) {
            const win = window.open("", "", "width=300,height=800");
            let itemsCust = "";
            d.items.forEach(i => {
                itemsCust += `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
                    <span>${i.nama} x${i.qty}</span><span>${(i.harga*i.qty).toLocaleString()}</span></div>`;
            });

            let itemsKit = "";
            d.items.forEach(i => {
                itemsKit += `<div style="font-size:14px;margin-bottom:3px;font-weight:bold;">- ${i.nama} x${i.qty}</div>`;
            });

            win.document.write(`<html><head><style>
                body { font-family: 'Courier New', monospace; width: 5.8cm; padding: 10px; margin: 0; box-sizing: border-box; }
                .line { border-bottom: 1px dashed black; margin: 8px 0; }
                .bold { font-weight: bold; }
                .center { text-align: center; }
                .cut-line { border-bottom: 2px solid black; margin: 20px 0; text-align: center; font-size: 10px; }
            </style></head>
            <body onload="window.print();window.close()">
                <div class="center bold" style="border:1px solid black;">CUSTOMER COPY</div>
                <div class="center"><h3 style="margin:5px 0;">ROTI HEGARSARI</h3><p style="font-size:10px;">Cabang: ${d.lokasi}</p></div>
                <div class="line"></div>
                <div class="center bold" style="font-size:18px;"># ${d.antrian}</div>
                <div style="font-size:11px;">ID: ${d.id}<br>Nama: ${d.customerName}<br>Tgl: ${d.waktu}</div>
                <div class="line"></div>
                ${itemsCust}
                <div class="line"></div>
                <div style="display:flex;justify-content:space-between;" class="bold"><span>TOTAL:</span><span>Rp ${d.total.toLocaleString()}</span></div>
                <div class="line"></div>
                <div class="center" style="font-size:10px;">Terima kasih!</div>

                <div class="cut-line">--------- POTONG DISINI ---------</div>

                <div class="center bold" style="border:1px solid black;">KITCHEN COPY</div>
                <div class="center bold" style="font-size:24px; margin:10px 0;"># ${d.antrian}</div>
                <div style="font-size:12px;">Nama: ${d.customerName}<br>Waktu: ${d.waktu}</div>
                <div class="line"></div>
                ${itemsKit}
                <div class="line"></div>
                <div class="bold">CATATAN:</div>
                <div style="font-size:14px; background:#eee; padding:5px;">${d.catatan}</div>
                <div class="line"></div>
                <div class="center">-- SEGERA DIPROSES --</div>
            </body></html>`);
            win.document.close();
        }

        function kirimWA() {
            if(!dataTerakhir.customerPhone || dataTerakhir.customerPhone === "-") return alert("Nomor HP Kosong!");
            const phone = dataTerakhir.customerPhone.startsWith('0') ? '62' + dataTerakhir.customerPhone.slice(1) : dataTerakhir.customerPhone;
            let daftarBarang = "";
            dataTerakhir.items.forEach(i => { daftarBarang += `${i.nama} x${i.qty} = Rp ${(i.harga * i.qty).toLocaleString()}%0A`; });
            let txt = `*ROTI HEGARSARI - ${dataTerakhir.lokasi}*%0A---------------------------%0AHalo *${dataTerakhir.customerName}*, terima kasih!%0A%0A*RINCIAN:*%0A${daftarBarang}---------------------------%0ATotal: *Rp ${dataTerakhir.total.toLocaleString()}*%0AAntrian: *${dataTerakhir.antrian}*%0ACatatan: ${dataTerakhir.catatan}%0A---------------------------`;
            window.open(`https://wa.me/${phone}?text=${txt}`);
        }
    </script>
</body>
</html>
