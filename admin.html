<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-logout { background: #c0392b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; display: block; width: fit-content; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html">🏠 Dashboard</a>
        <a href="sales.html">🛒 Sales</a>
        <a href="report.html">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html" style="background: #34495e;">⚙️ Admin</a>
        <a href="#" onclick="logout()" class="btn-logout">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Admin Panel (Manajemen Stok)</h1>

        <div class="form-container">
            <h3>Tambah / Edit Produk</h3>
            <div class="form-group">
                <label>Nama Roti:</label>
                <input type="text" id="namaProduk" placeholder="Contoh: Bolen Lilit">
            </div>
            <div class="form-group">
                <label>Harga (Rp):</label>
                <input type="number" id="hargaProduk" placeholder="15000">
            </div>
            <div class="form-group">
                <label>Stok:</label>
                <input type="number" id="stokProduk" placeholder="50">
            </div>
            <div class="form-group">
                <label>Kategori:</label>
                <select id="kategoriProduk">
                    <option value="Roti Manis">Roti Manis</option>
                    <option value="Roti Asin">Roti Asin</option>
                    <option value="Pastry">Pastry</option>
                    <option value="Minuman">Minuman</option>
                </select>
            </div>
            <div class="form-group">
                <label>Link Foto (URL):</label>
                <input type="text" id="fotoProduk" placeholder="https://...">
            </div>
            <button class="btn-save" onclick="simpanProduk()">Simpan Produk</button>
        </div>

        <div class="card">
            <h3>Daftar Stok Produk</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelProduk">
                    <tr><td colspan="6" align="center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- GEMBOK KEAMANAN ROLE (SUPER ADMIN ONLY) ---
        auth.onAuthStateChanged((user) => {
            const role = localStorage.getItem("userRole");
            if (!user || role !== "superadmin") {
                window.location.href = "sales.html"; 
            }
        });

        function logout() {
            auth.signOut().then(() => { 
                localStorage.removeItem("userRole");
                localStorage.removeItem("cabangSekarang");
                window.location.href = "login.html"; 
            });
        }

        function simpanProduk() {
            const nama = document.getElementById('namaProduk').value;
            const harga = parseInt(document.getElementById('hargaProduk').value);
            const stok = parseInt(document.getElementById('stokProduk').value);
            const kategori = document.getElementById('kategoriProduk').value;
            const foto = document.getElementById('fotoProduk').value;

            if(!nama || !harga) return alert("Nama dan Harga wajib diisi!");

            const newKey = db.ref().child('produk').push().key;
            db.ref('produk/' + newKey).set({
                nama: nama,
                harga: harga,
                stok: stok,
                kategori: kategori,
                foto: foto
            }).then(() => {
                alert("Produk Berhasil Disimpan!");
                location.reload();
            });
        }

        db.ref('produk/').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            for(let key in data) {
                const p = data[key];
                html += `<tr>
                    <td><img src="${p.foto || 'https://via.placeholder.com/50'}" class="img-preview"></td>
                    <td>${p.nama}</td>
                    <td>${p.kategori}</td>
                    <td>Rp ${p.harga.toLocaleString()}</td>
                    <td><strong>${p.stok}</strong></td>
                    <td>
                        <button class="btn-delete" onclick="hapusProduk('${key}')">Hapus</button>
                    </td>
                </tr>`;
            }
            document.getElementById('tabelProduk').innerHTML = html || "<tr><td colspan='6' align='center'>Belum ada produk.</td></tr>";
        });

        function hapusProduk(key) {
            if(confirm("Yakin ingin menghapus produk ini?")) {
                db.ref('produk/' + key).remove();
            }
        }
    </script>
</body>
</html>
