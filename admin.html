<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-update { background: #f39c12 !important; }
        .btn-cancel { background: #95a5a6; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; display: none; }
        
        .pagination { display: flex; gap: 5px; margin-top: 10px; justify-content: center; align-items: center; }
        .page-btn { padding: 5px 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .page-btn.active { background: #3498db; color: white; border-color: #3498db; }
        .page-btn:disabled { cursor: not-allowed; opacity: 0.5; }

        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        
        .danger-zone { border-top: 5px solid #e74c3c; background: #fff5f5; }
        .search-container { margin-bottom: 15px; }
        .search-container input { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ddd; padding-left: 20px; box-sizing: border-box; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #f9f9f9; }
        
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-tool { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html" class="menu-admin">🏠 Dashboard</a>
        <a href="sales.html">🛒 Sales</a>
        <a href="report.html" class="menu-admin">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html" class="menu-admin" style="background: #34495e;">⚙️ Admin</a>
        <a href="#" onclick="logout()" style="color: #e74c3c; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Admin Panel</h1>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="form-container" style="flex: 2; min-width: 300px;">
                <h3 id="formTitle">Tambah / Edit Produk</h3>
                <input type="hidden" id="editKey">
                <div class="form-group"><label>Nama Roti:</label><input type="text" id="namaProduk"></div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;"><label>Harga:</label><input type="number" id="hargaProduk"></div>
                    <div class="form-group" style="flex:1;"><label>Stok:</label><input type="number" id="stokProduk"></div>
                </div>
                <div class="form-group">
                    <label>Kategori:</label>
                    <select id="kategoriProduk"><option value="">Pilih Kategori...</option></select>
                </div>
                <div class="form-group"><label>Link Foto:</label><input type="text" id="fotoProduk"></div>
                <button id="btnSave" class="btn-save" onclick="simpanProduk()">💾 Simpan Produk</button>
                <button id="btnCancel" class="btn-cancel" onclick="resetForm()">❌ Batal Edit</button>
                
                <hr>
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                    <h4 style="margin-top:0;">🚀 Update Stok Massal</h4>
                    <div class="tools-grid">
                        <button onclick="downloadMasterStok()" class="btn-tool" style="background: #2980b9;">📥 1. Download Data</button>
                        <label class="btn-tool" style="background: #27ae60; cursor: pointer;">
                            📤 2. Upload Update
                            <input type="file" id="fileUpdateStok" accept=".xlsx, .xls" style="display:none;" onchange="importUpdateStok()">
                        </label>
                    </div>
                </div>
            </div>

            <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 20px;">
                <div class="form-container">
                    <h3>Atur Kategori</h3>
                    <input type="text" id="newKategori" placeholder="Kategori baru..." style="width: 75%; padding: 8px;">
                    <button onclick="tambahKategori()" style="padding: 8px;">➕</button>
                    <div id="listKategori" style="margin-top: 10px; min-height: 120px;"></div>
                    <div id="paginationKat" class="pagination"></div>
                </div>

                <div class="form-container danger-zone">
                    <h3>🧹 Bersihkan Data Penjualan</h3>
                    <div class="form-group">
                        <label>Pilih Lokasi Cabang:</label>
                        <select id="delCabang">
                            <option value="Semua">Semua Cabang</option>
                            </select>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <div class="form-group" style="flex:1;">
                            <label>Dari:</label>
                            <input type="date" id="delStart">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Sampai:</label>
                            <input type="date" id="delEnd">
                        </div>
                    </div>
                    <button class="btn-delete" style="width: 100%; padding: 12px; font-size: 14px;" onclick="hapusTransaksiRentang()">Hapus Permanen</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                <h3>Daftar Stok Produk</h3>
                <div class="search-container" style="width: 300px;">
                    <input type="text" id="searchProduk" placeholder="🔍 Cari nama produk..." oninput="renderProduk()">
                </div>
            </div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr><th>Foto</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabelProduk"></tbody>
            </table>
            <div id="paginationProd" class="pagination" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allKategori = [];
        let pageKat = 1;
        const limitKat = 3;

        let allProduk = [];
        let pageProd = 1;
        const limitProd = 10;

        auth.onAuthStateChanged((user) => {
            const role = localStorage.getItem("userRole");
            if (!user || role !== "superadmin") { window.location.href = "sales.html"; }
        });

        // MUAT DAFTAR CABANG UNTUK DROPDOWN HAPUS
        db.ref('cabang/').once('value', (snap) => {
            const selectDel = document.getElementById('delCabang');
            snap.forEach(child => {
                let opt = document.createElement('option');
                opt.value = child.val();
                opt.innerText = child.val();
                selectDel.appendChild(opt);
            });
        });

        // --- HAPUS DATA DENGAN FILTER CABANG ---
        function hapusTransaksiRentang() {
            const cabang = document.getElementById('delCabang').value;
            const start = document.getElementById('delStart').value;
            const end = document.getElementById('delEnd').value;

            if (!start || !end) return alert("Pilih rentang tanggal!");

            const confirmMsg = `⚠️ PERINGATAN!\nLokasi: ${cabang}\nRentang: ${start} s/d ${end}\n\nData akan DIHAPUS PERMANEN. Lanjutkan?`;
            
            if (confirm(confirmMsg)) {
                db.ref('transaksi').orderByChild('tanggalMurni').startAt(start).endAt(end).once('value', (snap) => {
                    if (!snap.exists()) return alert("Tidak ada data ditemukan.");

                    let count = 0;
                    const updates = {};
                    
                    snap.forEach(child => {
                        const trx = child.val();
                        // Filter logika: Jika 'Semua' atau lokasi transaksi cocok dengan pilihan
                        if (cabang === "Semua" || trx.lokasi === cabang) {
                            updates[child.key] = null;
                            count++;
                        }
                    });

                    if (count === 0) return alert(`Tidak ada data ditemukan untuk cabang ${cabang} di rentang tanggal tersebut.`);

                    db.ref('transaksi').update(updates).then(() => {
                        alert(`Sukses! ${count} data transaksi dari cabang ${cabang} telah dihapus.`);
                        location.reload();
                    });
                });
            }
        }

        // --- LOGIKA UPDATE MASSAL ---
        function downloadMasterStok() {
            const dataToExport = allProduk.map(p => ({
                ID_UNIK: p.id,
                NAMA: p.nama,
                KATEGORI: p.kategori,
                STOK_SEKARANG: p.stok
            }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "MasterStok");
            XLSX.writeFile(wb, "Master_Stok_Hegarsari.xlsx");
        }

        function importUpdateStok() {
            const file = document.getElementById('fileUpdateStok').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if(confirm(`Update stok untuk ${json.length} produk?`)) {
                    const updates = {};
                    json.forEach(item => { if(item.ID_UNIK) updates[`/produk/${item.ID_UNIK}/stok`] = parseInt(item.STOK_SEKARANG) || 0; });
                    db.ref().update(updates).then(() => { alert("Berhasil Diupdate!"); });
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- KATEGORI ---
        function muatKategori() {
            db.ref('kategori_produk').on('value', (snap) => {
                allKategori = [];
                const data = snap.val() || {};
                Object.keys(data).forEach(id => { allKategori.push({ id, nama: data[id] }); });
                allKategori.reverse();
                renderKategori();
                updateDropdownKategori();
            });
        }

        function renderKategori() {
            const container = document.getElementById('listKategori');
            const paginContainer = document.getElementById('paginationKat');
            container.innerHTML = "";
            const start = (pageKat - 1) * limitKat;
            const end = start + limitKat;
            const displayed = allKategori.slice(start, end);
            displayed.forEach(item => {
                container.innerHTML += `<div class="cat-item"><span>${item.nama}</span><button class="btn-delete" style="padding:2px 6px;" onclick="hapusKategori('${item.id}')">✕</button></div>`;
            });
            const totalPage = Math.ceil(allKategori.length / limitKat);
            paginContainer.innerHTML = `<button class="page-btn" onclick="changePageKat(-1)" ${pageKat === 1 ? 'disabled' : ''}>Prev</button><span>${pageKat}/${totalPage||1}</span><button class="page-btn" onclick="changePageKat(1)" ${pageKat === totalPage || totalPage === 0 ? 'disabled' : ''}>Next</button>`;
        }
        function changePageKat(dir) { pageKat += dir; renderKategori(); }
        function updateDropdownKategori() {
            let options = '<option value="">Pilih Kategori...</option>';
            [...allKategori].sort((a,b) => a.nama.localeCompare(b.nama)).forEach(item => { options += `<option value="${item.nama}">${item.nama}</option>`; });
            document.getElementById('kategoriProduk').innerHTML = options;
        }
        function tambahKategori() {
            const kat = document.getElementById('newKategori').value.trim();
            if(!kat) return;
            db.ref('kategori_produk').push(kat).then(() => { document.getElementById('newKategori').value = ""; pageKat = 1; });
        }
        function hapusKategori(id) { if(confirm("Hapus kategori?")) db.ref('kategori_produk/'+id).remove(); }

        // --- PRODUK ---
        function muatProduk() {
            db.ref('produk').on('value', (snap) => {
                allProduk = [];
                const data = snap.val() || {};
                Object.keys(data).forEach(id => { allProduk.push({ id, ...data[id] }); });
                renderProduk();
            });
        }

        function renderProduk() {
            const keyword = document.getElementById('searchProduk').value.toLowerCase();
            const table = document.getElementById('tabelProduk');
            const paginContainer = document.getElementById('paginationProd');
            let filtered = allProduk.filter(p => p.nama.toLowerCase().includes(keyword));
            filtered.sort((a, b) => a.kategori.localeCompare(b.kategori) || a.nama.localeCompare(b.nama));
            const start = (pageProd - 1) * limitProd;
            const end = start + limitProd;
            const displayed = filtered.slice(start, end);
            table.innerHTML = "";
            displayed.forEach(p => {
                table.innerHTML += `<tr>
                    <td><img src="${p.foto || 'https://via.placeholder.com/40'}" class="img-preview"></td>
                    <td>${p.nama}</td>
                    <td><span style="background:#eee; padding:2px 8px; border-radius:10px; font-size:11px;">${p.kategori}</span></td>
                    <td>Rp ${p.harga.toLocaleString()}</td>
                    <td><strong style="color:${p.stok <= 5 ? 'red' : 'black'}">${p.stok}</strong></td>
                    <td>
                        <button class="btn-edit" onclick="editProduk('${p.id}', '${p.nama}', ${p.harga}, ${p.stok}, '${p.kategori}', '${p.foto}')">Edit</button>
                        <button class="btn-delete" onclick="hapusProduk('${p.id}')">Hapus</button>
                    </td>
                </tr>`;
            });
            const totalPage = Math.ceil(filtered.length / limitProd);
            paginContainer.innerHTML = `<button class="page-btn" onclick="changePageProd(-1)" ${pageProd === 1 ? 'disabled' : ''}>Prev</button><span>Halaman ${pageProd} dari ${totalPage || 1}</span><button class="page-btn" onclick="changePageProd(1)" ${pageProd === totalPage || totalPage === 0 ? 'disabled' : ''}>Next</button>`;
        }
        function changePageProd(dir) { pageProd += dir; renderProduk(); }

        function simpanProduk() {
            const key = document.getElementById('editKey').value;
            const data = {
                nama: document.getElementById('namaProduk').value,
                harga: parseInt(document.getElementById('hargaProduk').value),
                stok: parseInt(document.getElementById('stokProduk').value),
                kategori: document.getElementById('kategoriProduk').value,
                foto: document.getElementById('fotoProduk').value
            };
            if(!data.nama || !data.kategori) return alert("Lengkapi data!");
            const ref = key ? db.ref('produk/' + key) : db.ref('produk').push();
            ref.set(data).then(() => { alert("Berhasil!"); resetForm(); });
        }

        function editProduk(key, nama, harga, stok, kategori, foto) {
            document.getElementById('formTitle').innerText = "Mode Edit";
            document.getElementById('editKey').value = key;
            document.getElementById('namaProduk').value = nama;
            document.getElementById('hargaProduk').value = harga;
            document.getElementById('stokProduk').value = stok;
            document.getElementById('kategoriProduk').value = kategori;
            document.getElementById('fotoProduk').value = foto;
            document.getElementById('btnSave').innerText = "Update Produk";
            document.getElementById('btnSave').classList.add('btn-update');
            document.getElementById('btnCancel').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editKey').value = "";
            document.getElementById('namaProduk').value = "";
            document.getElementById('hargaProduk').value = "";
            document.getElementById('stokProduk').value = "";
            document.getElementById('kategoriProduk').value = "";
            document.getElementById('fotoProduk').value = "";
            document.getElementById('formTitle').innerText = "Tambah / Edit Produk";
            document.getElementById('btnSave').innerText = "💾 Simpan Produk";
            document.getElementById('btnSave').classList.remove('btn-update');
            document.getElementById('btnCancel').style.display = "none";
        }

        function hapusProduk(key) { if(confirm("Yakin hapus?")) db.ref('produk/' + key).remove(); }
        function logout() { auth.signOut().then(() => { localStorage.clear(); window.location.href = "login.html"; }); }

        muatKategori();
        muatProduk();
    </script>
</body>
</html>
