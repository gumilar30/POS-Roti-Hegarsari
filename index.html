<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - POS Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h3 { margin: 0; color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #2c3e50; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🍞 Hegarsari</h2>
    <a href="index.html" style="background: #34495e;">🏠 Dashboard</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="report.html">📊 Report</a>
    <a href="search.html">🔎 Search Resi</a>
    <a href="admin.html">⚙️ Admin Panel</a>
</div>

<div class="content">
    <h1>Dashboard</h1>
    <p>Ringkasan performa toko hari ini (Live Cloud):</p>

    <div class="summary-grid">
        <div class="stat-card">
            <h3>Total Omzet</h3>
            <div id="dashOmzet" class="stat-value">Rp 0</div>
        </div>
        <div class="stat-card">
            <h3>Total Transaksi</h3>
            <div id="dashTransaksi" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <h3>Produk Terdaftar</h3>
            <div id="dashProduk" class="stat-value">0</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
        authDomain: "roti-hegarsari.firebaseapp.com",
        databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "roti-hegarsari",
        storageBucket: "roti-hegarsari.firebasestorage.app",
        messagingSenderId: "770636746020",
        appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Ambil Ringkasan Produk
    database.ref('produk/').on('value', (snapshot) => {
        const data = snapshot.val();
        document.getElementById("dashProduk").innerText = data ? Object.keys(data).length : 0;
    });

    // Ambil Ringkasan Transaksi
    database.ref('transaksi/').on('value', (snapshot) => {
        const data = snapshot.val();
        let totalOmzet = 0;
        let count = 0;

        if (data) {
            for (let key in data) {
                totalOmzet += data[key].total;
                count++;
            }
        }
        document.getElementById("dashOmzet").innerText = "Rp " + totalOmzet.toLocaleString();
        document.getElementById("dashTransaksi").innerText = count;
    });
</script>

</body>
</html>
