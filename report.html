<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #3498db; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #2c3e50; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background-color: #f9f9f9; }
        .badge-cash { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html">🏠 Dashboard</a>
        <a href="sales.html">🛒 Sales</a>
        <a href="report.html" style="background: #34495e;">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html">⚙️ Admin</a>
    </div>

    <div class="content">
        <h1>Laporan Penjualan (Cloud Mode)</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <small>TOTAL OMZET</small>
                <h2 id="totalOmzet">Rp 0</h2>
            </div>
            <div class="stat-card" style="border-left-color: #27ae60;">
                <small>JUMLAH TRANSAKSI</small>
                <h2 id="totalTransaksi">0</h2>
            </div>
        </div>

        <div class="table-container">
            <h3>Riwayat Transaksi Terkini</h3>
            <table>
                <thead>
                    <tr>
                        <th>No. Resi</th>
                        <th>Tanggal & Waktu</th>
                        <th>No. HP Customer</th>
                        <th>Metode</th>
                        <th>Total Bayar</th>
                    </tr>
                </thead>
                <tbody id="tabelRiwayat">
                    <tr><td colspan="5" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Ambil Data Transaksi Real-time
        database.ref('transaksi/').on('value', (snapshot) => {
            const data = snapshot.val();
            const tableBody = document.getElementById("tabelRiwayat");
            tableBody.innerHTML = "";
            
            let totalDuit = 0;
            let jumlahTrans = 0;

            if (data) {
                // Mengubah objek menjadi array dan mengurutkan dari yang terbaru (descending)
                const keys = Object.keys(data).reverse(); 
                
                keys.forEach((key) => {
                    const t = data[key];
                    totalDuit += parseInt(t.total || 0);
                    jumlahTrans++;

                    // Menangani data lama yang mungkin tidak punya field 'id' atau 'waktu'
                    const resi = t.id || key; 
                    const waktu = t.waktu || "Data Lama";
                    const hp = t.customer || "-";
                    const metode = t.metode || "Cash";
                    const total = parseInt(t.total || 0).toLocaleString();

                    tableBody.innerHTML += `
                        <tr>
                            <td><strong>${resi}</strong></td>
                            <td>${waktu}</td>
                            <td>${hp}</td>
                            <td><span class="badge-cash">${metode}</span></td>
                            <td style="font-weight:bold;">Rp ${total}</td>
                        </tr>
                    `;
                });

                document.getElementById("totalOmzet").innerText = "Rp " + totalDuit.toLocaleString();
                document.getElementById("totalTransaksi").innerText = jumlahTrans;
            } else {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Belum ada transaksi hari ini.</td></tr>";
            }
        });
    </script>
</body>
</html>
