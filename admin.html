<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-import { background: #f39c12; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-kat { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍞 Hegarsari</h2>
        <a href="index.html" class="menu-admin">🏠 Dashboard</a>
        <a href="sales.html">🛒 Sales</a>
        <a href="report.html" class="menu-admin">📊 Report</a>
        <a href="search.html">🔍 Search Resi</a>
        <a href="admin.html" class="menu-admin" style="background: #34495e;">⚙️ Admin</a>
        <a href="#" onclick="logout()" style="color: #e74c3c; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Admin Panel (Manajemen Stok)</h1>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="form-container" style="flex: 2; min-width: 300px;">
                <h3>Tambah / Edit Produk</h3>
                <div class="form-group">
                    <label>Nama Roti:</label>
                    <input type="text" id="namaProduk" placeholder="Contoh: Bolen Lilit">
                </div>
                <div class="form-group">
                    <label>Harga (Rp):</label>
                    <input type="number" id="hargaProduk" placeholder="15000">
                </div>
                <div class="form-group">
                    <label>Stok:</label>
                    <input type="number" id="stokProduk" placeholder="50">
                </div>
                <div class="form-group">
                    <label>Kategori:</label>
                    <select id="kategoriProduk">
                        <option value="">Pilih Kategori...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Link Foto (URL):</label>
                    <input type="text" id="fotoProduk" placeholder="https://...">
                </div>
                <button class="btn-save" onclick="simpanProduk()">💾 Simpan Produk</button>
                
                <hr>
                <label style="font-weight: bold; font-size: 14px;">Import dari Excel:</label><br><br>
                <input type="file" id="fileExcel" accept=".xlsx, .xls, .csv" style="font-size: 12px;">
                <button class="btn-import" onclick="importExcel()">📥 Proses Import</button>
            </div>

            <div class="form-container" style="flex: 1; min-width: 250px;">
                <h3>Atur Kategori</h3>
                <input type="text" id="newKategori" placeholder="Nama kategori baru..." style="width: 100%; padding: 8px; margin-bottom: 10px;">
                <button class="btn-kat" style="width: 100%;" onclick="tambahKategori()">➕ Tambah Kategori</button>
                <ul id="listKategori" style="margin-top: 15px; font-size: 13px; padding-left: 20px;"></ul>
            </div>
        </div>

        <div class="card">
            <h3>Daftar Stok Produk</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelProduk">
                    <tr><td colspan="6" align="center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
            authDomain: "roti-hegarsari.firebaseapp.com",
            databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roti-hegarsari",
            storageBucket: "roti-hegarsari.firebasestorage.app",
            messagingSenderId: "770636746020",
            appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // GEMBOK SUPER ADMIN
        auth.onAuthStateChanged((user) => {
            const role = localStorage.getItem("userRole");
            if (!user || role !== "superadmin") { window.location.href = "sales.html"; }
        });

        // 1. MANAJEMEN KATEGORI DINAMIS
        function muatKategori() {
            db.ref('kategori_produk').on('value', (snap) => {
                const data = snap.val() || {};
                let options = '<option value="">Pilih Kategori...</option>';
                let list = '';
                Object.keys(data).forEach(id => {
                    options += `<option value="${data[id]}">${data[id]}</option>`;
                    list += `<li>${data[id]} <a href="#" onclick="hapusKategori('${id}')" style="color:red; margin-left:10px;">[x]</a></li>`;
                });
                document.getElementById('kategoriProduk').innerHTML = options;
                document.getElementById('listKategori').innerHTML = list;
            });
        }

        function tambahKategori() {
            const kat = document.getElementById('newKategori').value;
            if(!kat) return;
            db.ref('kategori_produk').push(kat).then(() => {
                document.getElementById('newKategori').value = "";
            });
        }

        function hapusKategori(id) {
            if(confirm("Hapus kategori ini?")) db.ref('kategori_produk/'+id).remove();
        }

        // 2. SIMPAN PRODUK MANUAL
        function simpanProduk() {
            const nama = document.getElementById('namaProduk').value;
            const harga = parseInt(document.getElementById('hargaProduk').value);
            const stok = parseInt(document.getElementById('stokProduk').value);
            const kategori = document.getElementById('kategoriProduk').value;
            const foto = document.getElementById('fotoProduk').value;

            if(!nama || !harga || !kategori) return alert("Nama, Harga, dan Kategori wajib diisi!");

            db.ref('produk').push({
                nama, harga, stok, kategori, foto: foto || ""
            }).then(() => {
                alert("Produk Berhasil Disimpan!");
                document.getElementById('namaProduk').value = "";
                document.getElementById('hargaProduk').value = "";
                document.getElementById('stokProduk').value = "";
            });
        }

        // 3. IMPORT EXCEL
        function importExcel() {
            const file = document.getElementById('fileExcel').files[0];
            if(!file) return alert("Pilih file excel dulu!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const json = XLSX.utils.sheet_to_json(worksheet);

                if(confirm(`Import ${json.length} data produk?`)) {
                    json.forEach(item => {
                        db.ref('produk').push({
                            nama: item.Nama || item.nama,
                            harga: parseInt(item.Harga || item.harga) || 0,
                            stok: parseInt(item.Stok || item.stok) || 0,
                            kategori: item.Kategori || item.kategori || "Umum",
                            foto: item.Foto || item.foto || ""
                        });
                    });
                    alert("Import Selesai!");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 4. TAMPILKAN TABEL PRODUK
        db.ref('produk/').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            for(let key in data) {
                const p = data[key];
                html += `<tr>
                    <td><img src="${p.foto || 'https://via.placeholder.com/50'}" class="img-preview"></td>
                    <td>${p.nama}</td>
                    <td>${p.kategori}</td>
                    <td>Rp ${p.harga.toLocaleString()}</td>
                    <td><strong>${p.stok}</strong></td>
                    <td><button class="btn-delete" onclick="hapusProduk('${key}')">Hapus</button></td>
                </tr>`;
            }
            document.getElementById('tabelProduk').innerHTML = html || "<tr><td colspan='6' align='center'>Belum ada produk.</td></tr>";
        });

        function hapusProduk(key) {
            if(confirm("Yakin hapus produk?")) db.ref('produk/' + key).remove();
        }

        function logout() {
            auth.signOut().then(() => { localStorage.clear(); window.location.href = "login.html"; });
        }

        muatKategori();
    </script>
</body>
</html>
