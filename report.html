<!DOCTYPE html>
<html>
<head>
    <title>Report - POS Roti Hegarsari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 {
            margin-top: 0;
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .value {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🍞 Hegarsari</h2>
    <a href="index.html">🏠 Dashboard</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="search.html">🔎 Search Resi</a>
    <a href="report.html" style="background: #34495e;">📊 Report</a>
    <a href="admin.html">⚙️ Admin</a>
</div>

<div class="content">
    <h1>Laporan Penjualan (Cloud)</h1>

    <div class="grid">
        <div class="card">
            <h2>Total Omzet (Semua)</h2>
            <div id="totalOmzet" class="value">Rp 0</div>
        </div>
        <div class="card">
            <h2>Jumlah Transaksi</h2>
            <div id="jumlahTransaksi" class="value">0</div>
        </div>
    </div>

    <div class="card">
        <h2>Riwayat Transaksi Terkini</h2>
        <table>
            <thead>
                <tr>
                    <th>No Resi</th>
                    <th>Tanggal</th>
                    <th>Total Bayar</th>
                </tr>
            </thead>
            <tbody id="tabelLaporan">
                <tr><td colspan="3" style="text-align:center; padding:20px;">Memuat data dari Cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Pakai Config Firebase yang sama dengan admin/sales
    const firebaseConfig = {
        apiKey: "AIzaSyD0hNlCjszxB_3dPEJngPAFknfxiImK6Nc",
        authDomain: "roti-hegarsari.firebaseapp.com",
        databaseURL: "https://roti-hegarsari-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "roti-hegarsari",
        storageBucket: "roti-hegarsari.firebasestorage.app",
        messagingSenderId: "770636746020",
        appId: "1:770636746020:web:e7c12761ad3e295271b7b1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Tarik Data Transaksi secara Real-time
    database.ref('transaksi/').on('value', (snapshot) => {
        const dataTrans = snapshot.val();
        let listHtml = "";
        let totalOmzet = 0;
        let counter = 0;

        if (dataTrans) {
            // Kita loop data dari Firebase
            for (let key in dataTrans) {
                let t = dataTrans[key];
                totalOmzet += t.total;
                counter++;

                listHtml += `<tr>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${t.noResi}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${t.tanggal}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;"><b>Rp ${t.total.toLocaleString()}</b></td>
                </tr>`;
            }
            document.getElementById("tabelLaporan").innerHTML = listHtml;
            document.getElementById("totalOmzet").innerText = "Rp " + totalOmzet.toLocaleString();
            document.getElementById("jumlahTransaksi").innerText = counter;
        } else {
            document.getElementById("tabelLaporan").innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Belum ada transaksi.</td></tr>";
        }
    });
</script>

</body>
</html>
